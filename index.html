<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modern Counter App</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* background: linear-gradient(135deg, #667eea, #764ba2); */
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 300px;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    #count {
      font-size: 60px;
      margin: 20px 0;
      color: #764ba2;
      font-weight: bold;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .inc {
      background: #4CAF50;
      color: white;
    }

    .dec {
      background: #f44336;
      color: white;
    }

    .reset {
      background: #333;
      color: white;
    }

    button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Counter App</h2>
    <div id="count">0</div>

    <div class="buttons">
      <button class="inc" onclick="rihan()">increament</button>
      <button class="dec" onclick="rihankhan()">decreament</button>
      <button class="reset" onclick="ali()">Reset</button>
    </div>
  </div>

  <script>
   let no=0;

   function rihan(){
    no=no+1; // no mei 1 add kar do aur uske baad usse no ke andar store kar do
    document.getElementById("count").innerText=no; // count id vale element andar jo text usse no ki value se replace kar do chahe wo 0 ho ya 1 ya 2 ya 3 ya 4 ya 5 ya 6 ya 7 ya 8 ya 9 ya 10 ya usse bhi zyada koi bhi number ho 
   }

   function rihankhan(){
    no=no-1;
    document.getElementById("count").innerText=no;
   }
   function ali(){
    no=0;
    document.getElementById("count").innerText=no; // 
   }
  </script>

</body>
</html>
