
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsive</title>
    <style>
        @media screen and (max-width:770px) {
            *{
                padding: 0;
                margin: 0;
            }
body{
    background-color: chartreuse;
    height: 100%;
    width: 100%;
}
.navbar{
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
background-color:black;
gap:5px;

}
.navbarlist{
    display: flex;
width:60%;
}
.navbarlist li{
    padding:10px;
    list-style-type: none;
}
.navbarlist li a{
    text-decoration: none;
}
        
        }
    </style>
</head>
<body>
 <nav class="navbar">
    <ul class="navbarlist">
<li><a href="">About</a></li>
<li><a href="">Home</a></li>
<li><a href="">Contact</a></li>
</nav>
 </nav>   
</body>
</html>
