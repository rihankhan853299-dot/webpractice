
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsive</title>
    <style>
        @media screen and (max-width:770px) {
            *{
                padding: 0;
                margin: 0;
            }
body{
    background-color: chartreuse;
    height: 100%;
    width: 100%;
}
.navbar{
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
background-color:black;
gap:5px;

}
.navbarlist{
    display: flex;
}
.navbarlist li{
    padding:10px;
    list-style-type: none;
}
.navbarlist li a{
    text-decoration: none;
}
.search{
display:flex;
width: 20%;
padding:10px;
border-radius:30px
height:35px;
padding-top:4px
gap:5px;
}
            
        }
    </style>
</head>
<body>
 <nav class="navbar">
    <ul class="navbarlist">
<li><a href="">About</a></li>
<li><a href="">Home</a></li>
<li><a href="">Contact</a></li>
    <div class="search">
    <input type="text" name="search" id="" placeholder="search">
    <button>Search</button>
    </div>
</nav>
 </nav>   
</body>
</html>
